name: pkgdown-preview

on:
  pull_request:

permissions:
  contents: read

jobs:
  pkgdown-preview:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-pandoc@v2

      - name: Query dependencies
        run: |
          install.packages('remotes', repos = 'https://cloud.r-project.org')
          saveRDS(remotes::dev_package_deps(dependencies = TRUE), '.github/depends.Rds', version = 2)
          writeLines(sprintf('R-%i.%i', getRversion()$major, getRversion()$minor), '.github/R-version')
        shell: Rscript {0}

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-${{ hashFiles('.github/R-version') }}-pkgdown-${{ hashFiles('.github/depends.Rds') }}
          restore-keys: ${{ runner.os }}-${{ hashFiles('.github/R-version') }}-pkgdown-

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::pkgdown
            local::.

      - name: Build pkgdown site
        run: pkgdown::build_site(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Upload pkgdown preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkgdown-site-preview
          path: docs
          if-no-files-found: error
